<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Slider de Testimonios Responsivo con Scroll</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    .slider-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 2%;
      width: 100%;
    }

    .arrow {
      cursor: pointer;
      font-size: 3vw;
      user-select: none;
      flex-shrink: 0;
    }

    .testimonials {
      display: flex;
      gap: 2%;
      width: 80%;
      justify-content: center;
    }

    .testimonial-card {
      width: 48%;
      background: #f5f5f5;
      border-radius: 10px;
      padding: 5%;
      position: relative;
      display: flex;
      flex-direction: column;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      max-height: 400px;
      overflow-y: auto; /* Scroll para toda la tarjeta */
    }

    .avatar {
      width: 40%;
      aspect-ratio: 1/1;
      border-radius: 50%;
      object-fit: cover;
      margin: 0 auto;
    }

    .testimonial-content {
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      margin-top: 10px;
    }

    .testimonial-text {
      font-size: 1.2vw;
      color: #333;
      margin-top: 10px;
    }

    /* Personalizar el scrollbar en navegadores compatibles */
    .testimonial-card::-webkit-scrollbar {
      width: 5px;
    }
    .testimonial-card::-webkit-scrollbar-thumb {
      background-color: #aaa;
      border-radius: 10px;
    }

    @media (max-width: 768px) {
      .testimonial-text {
        font-size: 2.5vw;
      }
      .arrow {
        font-size: 6vw;
      }
      .testimonials {
        flex-direction: column;
        width: 80%;
      }
      .testimonial-card {
        width: 100%;
        margin-bottom: 20px;
      }
      .avatar {
        width: 40%;
      }
    }
  </style>
</head>
<body>

<div class="slider-container">
  <div class="arrow" id="left">&#8592;</div>

  <div class="testimonials" id="testimonialContainer">
    <!-- Testimonios se cargan aquí -->
  </div>

  <div class="arrow" id="right">&#8594;</div>
</div>

<script>
  const testimonies = [
    {
      avatar: 'https://randomuser.me/api/portraits/women/1.jpg',
      text: 'Este producto cambió mi vida por completo. Desde el primer momento en que lo utilicé, supe que había encontrado algo especial. La calidad de construcción es insuperable, la atención al cliente es de primer nivel, y cada detalle está pensado para maximizar la satisfacción del usuario. Después de probarlo, no puedo imaginar volver a mis métodos anteriores. Recomiendo este producto sin ninguna duda a todos los que quieran mejorar su experiencia diaria de manera significativa y duradera. Además, el soporte postventa es impresionante: resolvieron mis dudas rápidamente y con gran amabilidad.'
    },
    {
      avatar: 'https://randomuser.me/api/portraits/men/2.jpg',
      text: 'Una experiencia increíble desde el primer clic en su página web. La facilidad para navegar y encontrar exactamente lo que necesitaba fue refrescante. El proceso de compra fue sencillo y transparente, sin costos ocultos ni complicaciones. Cuando recibí el producto, superó todas mis expectativas. Cada función estaba perfectamente explicada en el manual, y la configuración fue un juego de niños. Además, he recibido varios correos electrónicos de seguimiento para asegurarme de que todo estuviera en orden. Esto demuestra su compromiso genuino con la satisfacción del cliente.'
    },
    {
      avatar: 'https://randomuser.me/api/portraits/women/3.jpg',
      text: 'Servicio al cliente excepcional y resultados impresionantes. Me sentí apoyada en cada paso del proceso. Antes de realizar la compra, tuve varias consultas que fueron atendidas casi de inmediato por un equipo amable y profesional. Posteriormente, me ofrecieron consejos de uso que realmente marcaron la diferencia. La dedicación que muestran hacia sus clientes es evidente y se traduce en una experiencia de usuario de primer nivel. Recomiendo esta empresa a todos aquellos que buscan no solo un producto, sino también una relación de confianza a largo plazo.'
    },
    {
      avatar: 'https://randomuser.me/api/portraits/men/4.jpg',
      text: 'Desde el primer día noté una gran diferencia en mi rutina diaria. No solo mejoró mi productividad, sino también mi bienestar general. La simplicidad de uso, combinada con un diseño elegante y funcionalidades intuitivas, convierte a este producto en una herramienta indispensable. Cada aspecto ha sido cuidadosamente pensado para maximizar el impacto positivo en la vida de los usuarios. Estoy extremadamente satisfecho con mi compra y planeo seguir explorando otros productos de esta marca en el futuro cercano. ¡Recomiendo ampliamente!'
    },
    {
      avatar: 'https://randomuser.me/api/portraits/women/5.jpg',
      text: 'Una solución innovadora que realmente funciona. Después de haber probado múltiples alternativas en el mercado, estaba escéptica respecto a este producto. Sin embargo, desde la primera semana de uso, vi mejoras tangibles que no había experimentado antes. Su combinación de tecnología avanzada y facilidad de uso es simplemente perfecta. Además, el equipo detrás del producto siempre está innovando y ofreciendo actualizaciones gratuitas, lo que hace que la experiencia sea aún mejor con el tiempo. No puedo dejar de recomendarlo a todo aquel que busque una verdadera solución de calidad.'
    }
  ];

  let currentIndex = 0;

  function renderTestimonials() {
    const container = document.getElementById('testimonialContainer');
    container.innerHTML = '';

    const testimonial1 = createTestimonialCard(testimonies[currentIndex]);
    container.appendChild(testimonial1);

    const nextIndex = (currentIndex + 1) % testimonies.length;
    const testimonial2 = createTestimonialCard(testimonies[nextIndex]);
    container.appendChild(testimonial2);
  }

  function createTestimonialCard(testimony) {
    const card = document.createElement('div');
    card.className = 'testimonial-card';

    const avatar = document.createElement('img');
    avatar.src = testimony.avatar;
    avatar.className = 'avatar';

    const content = document.createElement('div');
    content.className = 'testimonial-content';

    const text = document.createElement('div');
    text.className = 'testimonial-text';
    text.innerText = testimony.text;

    content.appendChild(text);
    card.appendChild(avatar);
    card.appendChild(content);

    return card;
  }

  document.getElementById('left').addEventListener('click', () => {
    currentIndex = (currentIndex - 1 + testimonies.length) % testimonies.length;
    renderTestimonials();
  });

  document.getElementById('right').addEventListener('click', () => {
    currentIndex = (currentIndex + 1) % testimonies.length;
    renderTestimonials();
  });

  // Inicializar
  renderTestimonials();
</script>

</body>
</html>
